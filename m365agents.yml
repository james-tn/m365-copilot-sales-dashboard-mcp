# yaml-language-server: $schema=https://aka.ms/m365-agents-toolkit/v1.11/yaml.schema.json
# Microsoft 365 Agents Toolkit lifecycle for the Sales Dashboard declarative agent.
# Docs: https://aka.ms/teamsfx-actions
version: v1.11

environmentFolderPath: ./env

# Triggered by `atk provision`.
provision:
  # Register the app in Teams Developer Portal.
  - uses: teamsApp/create
    with:
      name: Sales Dashboard${{APP_NAME_SUFFIX}}
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  # Build the app package (substitutes ${{...}} env tokens into the manifest,
  # declarativeAgent.json, ai-plugin.json and instruction.txt).
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build

  # Update the app registration with the latest package.
  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

  # Sideload the agent into Microsoft 365 Copilot (and Outlook / the M365 app).
  - uses: teamsApp/extendToM365
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
    writeToEnvironmentFile:
      titleId: M365_TITLE_ID
      appId: M365_APP_ID

# Triggered by `atk publish` (optional — submit to your org's admin for approval).
publish:
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build
  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
  - uses: teamsApp/publishAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
    writeToEnvironmentFile:
      publishedAppId: TEAMS_APP_PUBLISHED_APP_ID

projectId: 7a1c9e54-3b2d-4f8a-9c10-2e6b5d8f41aa
